name: Java CI

on:
  push:
    branches: [ '*' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'zulu'
        cache: 'maven'
    - name: Build with Maven
      run: mvn clean -B -U verify
  deploy:
    if: ${{ github.ref == 'refs/heads/master' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'zulu'
        cache: 'maven'
        server-id: cloudsmith-deploy
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
    - name: Build and deploy with Maven
      run: mvn clean -B -U deploy -Pdeploy-snapshot,-docker-enabled -DskipTests -Dinvoker.skip=true
      env:
        MAVEN_USERNAME: ${{ secrets.MAVEN_DEPLOY_USER }}
        MAVEN_PASSWORD: ${{ secrets.MAVEN_DEPLOY_PASS }}
    - name: Upload copy to Github
      uses: actions/upload-artifact@v4
      with:
        name: Plugin jar
        path: bans-distribution/executable/target/LibertyBans_*.jar
        if-no-files-found: error
